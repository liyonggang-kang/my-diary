<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑;}
        body{background:#f5f7fa;height:100vh;display:flex;align-items:center;justify-content:center;}
        .box{width:360px;background:#fff;padding:40px 30px;border-radius:10px;box-shadow:0 0 12px #eee;}
        h2{text-align:center;margin-bottom:30px;color:#333;}
        .item{margin-bottom:20px;}
        .item input{width:100%;height:42px;padding:0 12px;border:1px solid #ddd;border-radius:6px;outline:none;}
        .btn{width:100%;height:42px;background:#2d8cf0;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:15px;}
        .tip{text-align:center;margin-top:15px;font-size:14px;}
        .tip a{color:#2d8cf0;text-decoration:none;}
    </style>
</head>
<body>
<div class="box">
    <h2>账号注册</h2>
    <div class="item">
        <input type="text" id="regUser" placeholder="设置用户名">
    </div>
    <div class="item">
        <input type="password" id="regPwd" placeholder="设置密码">
    </div>
    <div class="item">
        <input type="password" id="rePwd" placeholder="确认密码">
    </div>
    <button class="btn" onclick="regSubmit()">立即注册</button>
    <div class="tip">已有账号？<a href="login.html">前往登录</a></div>
</div>
<script>
function getUsers(){
    let data = localStorage.getItem("userData");
    return data ? JSON.parse(data) : [];
}
function regSubmit(){
    let uname = document.getElementById("regUser").value.trim();
    let pwd = document.getElementById("regPwd").value.trim();
    let repwd = document.getElementById("rePwd").value.trim();
    if(!uname||!pwd||!repwd){
        alert("请填写完整账号信息");
        return;
    }
    if(pwd !== repwd){
        alert("两次输入密码不一致");
        return;
    }
    let userArr = getUsers();
    let exist = userArr.some(item=>item.username === uname);
    if(exist){
        alert("该用户名已被注册，请更换");
        return;
    }
    userArr.push({username:uname,password:pwd});
    localStorage.setItem("userData",JSON.stringify(userArr));
    alert("注册成功！即将跳转登录页");
    location.href = "login.html";
}
</script>
</body>
</html>
