<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑;}
        body{background:#f5f7fa;height:100vh;display:flex;align-items:center;justify-content:center;}
        .box{width:360px;background:#fff;padding:40px 30px;border-radius:10px;box-shadow:0 0 12px #eee;}
        h2{text-align:center;margin-bottom:30px;color:#333;}
        .item{margin-bottom:20px;}
        .item input{width:100%;height:42px;padding:0 12px;border:1px solid #ddd;border-radius:6px;outline:none;}
        .btn{width:100%;height:42px;background:#2d8cf0;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:15px;}
        .tip{text-align:center;margin-top:15px;font-size:14px;}
        .tip a{color:#2d8cf0;text-decoration:none;}
    </style>
</head>
<body>
<div class="box">
    <h2>账号登录</h2>
    <div class="item">
        <input type="text" id="username" placeholder="输入用户名">
    </div>
    <div class="item">
        <input type="password" id="password" placeholder="输入登录密码">
    </div>
    <button class="btn" onclick="loginSubmit()">登录进入</button>
    <div class="tip">没有账号？<a href="https://liyonggang-kang.github.io/my-diary/register.html">免费注册</a></div>
</div>
<script>
function getUsers(){
    let data = localStorage.getItem("userData");
    return data ? JSON.parse(data) : [];
}
function loginSubmit(){
    let uname = document.getElementById("username").value.trim();
    let pwd = document.getElementById("password").value.trim();
    if(!uname||!pwd){
        alert("请输入用户名和密码");
        return;
    }
    let userList = getUsers();
    let success = userList.find(item=>item.username===uname&&item.password===pwd);
    if(success){
        localStorage.setItem("nowUser",uname);
        alert("登录成功");
        location.href="https://liyonggang-kang.github.io/my-diary/plan.html";
    }else{
        alert("用户名或密码错误");
    }
}
</script>
</body>
</html>
